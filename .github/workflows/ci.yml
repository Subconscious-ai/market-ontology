name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  validate:
    name: Validate schema and kg_seed fixtures
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Validate causal_dag_v1 fixtures
        run: python scripts/validate_causal_dag.py

      - name: Run causal_dag_v1 tests
        run: python -m unittest tests.test_causal_dag_v1 -v

      - name: Validate kg_seed fixtures against Pydantic schema
        run: python scripts/validate_kg_seed.py

      - name: Validate generated contracts
        run: |
          python scripts/generate_kg_seed_contract.py --check
          python scripts/generate_twenty_app.py --check
          python scripts/generate_trustgraph_ontology.py --check
          python scripts/generate_repo_map.py --check
          python scripts/generate_repo_index.py --check
          python scripts/agent/nav_eval.py --check

      - name: Validate causal projection examples
        run: |
          python scripts/validate_causal_projection.py poc_v1/contracts/examples/causal_dag_projection.static.valid.json
          python scripts/validate_causal_projection.py poc_v1/contracts/examples/causal_dag_projection.timeseries.valid.json

      - name: Run projection tests
        run: python -m unittest discover -s tests -v

      - name: Import schema module
        run: python -c "from poc_v1.ontology import schema; print(f'[import] schema v{schema.SCHEMA_VERSION}, {len(schema.NODE_MODELS)} nodes, {len(schema.EDGE_MODELS)} edges')"

      - name: Doc-rot check
        run: bash scripts/check-doc-rot.sh
